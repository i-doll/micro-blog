apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  namespace: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-service
  template:
    metadata:
      labels:
        app: media-service
      annotations:
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
        traffic.sidecar.istio.io/excludeOutboundPorts: "5432,4222,8222"
    spec:
      serviceAccountName: media-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done']
        - name: wait-nats
          image: busybox:1.36
          command: ['sh', '-c', 'until wget -q --spider http://nats:8222/healthz; do echo waiting for nats; sleep 2; done']
      containers:
        - name: media-service
          image: blog/media:dev
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3006
          env:
            - name: PORT
              value: "3006"
            - name: UPLOAD_DIR
              value: "/data/uploads"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: media-service-db-creds
                  key: DATABASE_URL
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: blog-config
                  key: NATS_URL
            - name: NATS_NKEY_SEED
              valueFrom:
                secretKeyRef:
                  name: media-service-nats-creds
                  key: NATS_NKEY_SEED
          volumeMounts:
            - name: uploads
              mountPath: /data/uploads
          readinessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: media-uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: media-service
  namespace: blog
spec:
  selector:
    app: media-service
  ports:
    - port: 3006
      targetPort: 3006
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-uploads-pvc
  namespace: blog
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

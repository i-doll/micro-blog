apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: blog
data:
  nats.conf: |
    port: 4222
    http_port: 8222

    jetstream {
      store_dir: /data
    }

    authorization {
      users: [
        {
          # auth-service
          nkey: "UAMIISEKNX4O5YTPY6FD4PH3Y5PGLNUONEUG5HUJTK7R3QF6VZ73IWKH"
          permissions: {
            publish: {
              allow: ["blog.user.created", "$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.user.updated", "blog.user.deleted", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
        {
          # user-service
          nkey: "UAVYOZGHOPTQGX3PXLLRWKNNMDC32LNYBBYD4IF6D6A3O6FAOTFDYG2A"
          permissions: {
            publish: {
              allow: ["blog.user.>", "$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.user.created", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
        {
          # post-service
          nkey: "UC67VCEMMBATNDXPUR5YDEARDVTEE433XJZDHUJSEWSX7DM2GULAP5ZY"
          permissions: {
            publish: {
              allow: ["blog.post.>", "$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.user.deleted", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
        {
          # comment-service
          nkey: "UDTA4HJAUPHDS7XXFVTKTWJZVF6RXCHCS5FKBRNUSJFDHZQ6WVNVLWMI"
          permissions: {
            publish: {
              allow: ["blog.comment.>", "$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.post.deleted", "blog.user.deleted", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
        {
          # notification-service
          nkey: "UBHCHX5UEXCC4QIPYPQCN6JKY5MFJMRK2TIDASKKMJ65ALYT7GICZIPC"
          permissions: {
            publish: {
              allow: ["$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.comment.created", "blog.post.published", "blog.user.deleted", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
        {
          # search-indexer
          nkey: "UDTYUYWKTR7A533TXNI7BMGZZN4KQ5554UJOGY5YFUU6H264LKGIVUP3"
          permissions: {
            publish: {
              allow: ["$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.post.>", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
        {
          # media-service
          nkey: "UAXAA7OUZRLX24POWBZ5T6ITUDR343NRBU72R43J7JZOKYMFL2PYW6AH"
          permissions: {
            publish: {
              allow: ["blog.media.>", "$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.user.deleted", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
      annotations:
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
        traffic.sidecar.istio.io/excludeInboundPorts: "4222,8222"
    spec:
      serviceAccountName: nats
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["-c", "/etc/nats/nats.conf"]
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitoring
          volumeMounts:
            - name: natsdata
              mountPath: /data
            - name: nats-config
              mountPath: /etc/nats
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: natsdata
          emptyDir: {}
        - name: nats-config
          configMap:
            name: nats-config
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: blog
spec:
  selector:
    app: nats
  ports:
    - port: 4222
      targetPort: 4222
      name: client
    - port: 8222
      targetPort: 8222
      name: monitoring

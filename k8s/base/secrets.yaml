apiVersion: v1
kind: Secret
metadata:
  name: blog-secrets
  namespace: blog
type: Opaque
stringData:
  JWT_SECRET: "dev-secret-change-in-production"
  POSTGRES_PASSWORD: "postgres"
  USER_DB_URL: "postgresql://user_service:password@postgres:5432/blog_users"
  POST_DB_URL: "postgresql://post_service:password@postgres:5432/blog_posts"
  COMMENT_DB_URL: "postgresql://comment_service:password@postgres:5432/blog_comments"
  NOTIFICATION_DB_URL: "postgresql://notification_service:password@postgres:5432/blog_notifications"
  MEDIA_DB_URL: "postgresql://media_service:password@postgres:5432/blog_media"

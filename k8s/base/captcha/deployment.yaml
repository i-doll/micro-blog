apiVersion: apps/v1
kind: Deployment
metadata:
  name: captcha-service
  namespace: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: captcha-service
  template:
    metadata:
      labels:
        app: captcha-service
      annotations:
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
    spec:
      serviceAccountName: captcha-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: captcha-service
          image: blog/captcha:dev
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3008
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: PORT
              value: "3008"
            - name: CAPTCHA_SECRET
              valueFrom:
                secretKeyRef:
                  name: blog-shared-secrets
                  key: CAPTCHA_SECRET
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: blog-config
                  key: LOG_LEVEL
          readinessProbe:
            httpGet:
              path: /health
              port: 3008
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: captcha-service
  namespace: blog
spec:
  selector:
    app: captcha-service
  ports:
    - port: 3008
      targetPort: 3008

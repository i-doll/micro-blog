apiVersion: v1
kind: Secret
metadata:
  name: blog-secrets
  namespace: blog
type: Opaque
stringData:
  # ---------------------------------------------------------------
  # REPLACE these placeholder values before deploying.
  # In production, use an external secret manager (e.g. Sealed
  # Secrets, External Secrets Operator, or Vault) instead of
  # checking real credentials into this file.
  # ---------------------------------------------------------------
  JWT_SECRET: "CHANGE_ME_generate_with_openssl_rand_hex_32"
  POSTGRES_PASSWORD: "CHANGE_ME_postgres_password"
  USER_DB_URL: "CHANGE_ME_postgresql://user_service:PASSWORD@postgres:5432/blog_users"
  POST_DB_URL: "CHANGE_ME_postgresql://post_service:PASSWORD@postgres:5432/blog_posts"
  COMMENT_DB_URL: "CHANGE_ME_postgresql://comment_service:PASSWORD@postgres:5432/blog_comments"
  NOTIFICATION_DB_URL: "CHANGE_ME_postgresql://notification_service:PASSWORD@postgres:5432/blog_notifications"
  MEDIA_DB_URL: "CHANGE_ME_postgresql://media_service:PASSWORD@postgres:5432/blog_media"
  CAPTCHA_SECRET: "CHANGE_ME_generate_with_openssl_rand_hex_32"

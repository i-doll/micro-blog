apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  # Override base resources for production
  - path: istio-peer-auth-strict.yaml
  - path: istio-gateway-tls.yaml
  - path: vault-connection-patch.yaml
  - path: nats-tls-patch.yaml
  - path: istio-cors-patch.yaml
  # Scale up services
  - target:
      kind: Deployment
      name: user-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: post-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: comment-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  # Set resource limits
  - target:
      kind: Deployment
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

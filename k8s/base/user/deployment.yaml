apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: blog/user:dev
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: blog-secrets
                  key: USER_DB_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: blog-secrets
                  key: JWT_SECRET
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: blog-config
                  key: NATS_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: blog-config
                  key: LOG_LEVEL
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: blog
spec:
  selector:
    app: user-service
  ports:
    - port: 3001
      targetPort: 3001

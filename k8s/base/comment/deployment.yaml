apiVersion: apps/v1
kind: Deployment
metadata:
  name: comment-service
  namespace: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comment-service
  template:
    metadata:
      labels:
        app: comment-service
      annotations:
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
        traffic.sidecar.istio.io/excludeOutboundPorts: "5432,4222,8222"
    spec:
      serviceAccountName: comment-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done']
        - name: wait-nats
          image: busybox:1.36
          command: ['sh', '-c', 'until wget -q --spider http://nats:8222/healthz; do echo waiting for nats; sleep 2; done']
      containers:
        - name: comment-service
          image: blog/comment:dev
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3003
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: PORT
              value: "3003"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: comment-service-db-creds
                  key: DATABASE_URL
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: blog-config
                  key: NATS_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: blog-config
                  key: LOG_LEVEL
            - name: NATS_NKEY_SEED
              valueFrom:
                secretKeyRef:
                  name: comment-service-nats-creds
                  key: NATS_NKEY_SEED
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: comment-service
  namespace: blog
spec:
  selector:
    app: comment-service
  ports:
    - port: 3003
      targetPort: 3003

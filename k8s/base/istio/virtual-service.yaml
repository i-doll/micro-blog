apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: blog-routes
  namespace: blog
spec:
  hosts:
    - "*"
  gateways:
    - blog-gateway
  http:
    - match:
        - uri:
            prefix: /api/
      route:
        - destination:
            host: gateway
            port:
              number: 3000
      timeout: 30s
      retries:
        attempts: 2
        retryOn: 5xx,reset,connect-failure
    - match:
        - uri:
            exact: /health
      route:
        - destination:
            host: gateway
            port:
              number: 3000
      timeout: 15s
    - route:
        - destination:
            host: frontend
            port:
              number: 3007
      timeout: 15s

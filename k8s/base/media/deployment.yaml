apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  namespace: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-service
  template:
    metadata:
      labels:
        app: media-service
    spec:
      containers:
        - name: media-service
          image: blog/media:dev
          ports:
            - containerPort: 3006
          env:
            - name: PORT
              value: "3006"
            - name: UPLOAD_DIR
              value: "/data/uploads"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: blog-secrets
                  key: MEDIA_DB_URL
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: blog-config
                  key: NATS_URL
          volumeMounts:
            - name: uploads
              mountPath: /data/uploads
          readinessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: media-uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: media-service
  namespace: blog
spec:
  selector:
    app: media-service
  ports:
    - port: 3006
      targetPort: 3006
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-uploads-pvc
  namespace: blog
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

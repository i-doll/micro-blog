apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: blog/notification:dev
          ports:
            - containerPort: 3004
          env:
            - name: PORT
              value: "3004"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: blog-secrets
                  key: NOTIFICATION_DB_URL
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: blog-config
                  key: NATS_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: blog-config
                  key: LOG_LEVEL
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: blog
spec:
  selector:
    app: notification-service
  ports:
    - port: 3004
      targetPort: 3004

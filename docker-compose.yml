version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir", "/data", "-p", "4222", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
      network: host
    environment:
      PORT: "3009"
      DATABASE_URL: "postgresql://auth_service:${POSTGRES_PASSWORD}@postgres:5432/blog_auth"
      NATS_URL: "nats://nats:4222"
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: "info"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: services/user/Dockerfile
      network: host
    environment:
      PORT: "3001"
      DATABASE_URL: "postgresql://user_service:${POSTGRES_PASSWORD}@postgres:5432/blog_users"
      NATS_URL: "nats://nats:4222"
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: "info"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  post-service:
    build:
      context: .
      dockerfile: services/post/Dockerfile
      network: host
    environment:
      PORT: "3002"
      DATABASE_URL: "postgresql://post_service:${POSTGRES_PASSWORD}@postgres:5432/blog_posts"
      NATS_URL: "nats://nats:4222"
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: "info"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  comment-service:
    build:
      context: .
      dockerfile: services/comment/Dockerfile
      network: host
    environment:
      PORT: "3003"
      DATABASE_URL: "postgresql://comment_service:${POSTGRES_PASSWORD}@postgres:5432/blog_comments"
      NATS_URL: "nats://nats:4222"
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: "info"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: services/notification/Dockerfile
      network: host
    environment:
      PORT: "3004"
      DATABASE_URL: "postgresql://notification_service:${POSTGRES_PASSWORD}@postgres:5432/blog_notifications"
      NATS_URL: "nats://nats:4222"
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: "info"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  search-indexer:
    build:
      context: .
      dockerfile: crates/search/Dockerfile
      network: host
    environment:
      MODE: "indexer"
      PORT: "3005"
      NATS_URL: "nats://nats:4222"
      INDEX_PATH: "/data/tantivy_index"
    volumes:
      - searchdata:/data/tantivy_index
    depends_on:
      nats:
        condition: service_healthy

  search-query:
    build:
      context: .
      dockerfile: crates/search/Dockerfile
      network: host
    environment:
      MODE: "query"
      PORT: "3005"
      NATS_URL: "nats://nats:4222"
      INDEX_PATH: "/data/tantivy_index"
    volumes:
      - searchdata:/data/tantivy_index
    depends_on:
      search-indexer:
        condition: service_started
      nats:
        condition: service_healthy

  media-service:
    build:
      context: .
      dockerfile: crates/media/Dockerfile
      network: host
    environment:
      PORT: "3006"
      DATABASE_URL: "postgresql://media_service:${POSTGRES_PASSWORD}@postgres:5432/blog_media"
      NATS_URL: "nats://nats:4222"
      UPLOAD_DIR: "/data/uploads"
    volumes:
      - mediadata:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  captcha-service:
    build:
      context: .
      dockerfile: services/captcha/Dockerfile
      network: host
    environment:
      PORT: "3008"
      CAPTCHA_SECRET: ${CAPTCHA_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}

  gateway:
    build:
      context: .
      dockerfile: crates/gateway/Dockerfile
      network: host
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      JWT_SECRET: ${JWT_SECRET}
      CAPTCHA_SECRET: ${CAPTCHA_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      AUTH_SERVICE_URL: "http://auth-service:3009"
      USER_SERVICE_URL: "http://user-service:3001"
      POST_SERVICE_URL: "http://post-service:3002"
      COMMENT_SERVICE_URL: "http://comment-service:3003"
      NOTIFICATION_SERVICE_URL: "http://notification-service:3004"
      SEARCH_SERVICE_URL: "http://search-query:3005"
      MEDIA_SERVICE_URL: "http://media-service:3006"
      CAPTCHA_SERVICE_URL: "http://captcha-service:3008"
    depends_on:
      - auth-service
      - user-service
      - post-service
      - comment-service
      - notification-service
      - search-query
      - media-service
      - captcha-service

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
      network: host
    ports:
      - "3007:3007"
    environment:
      PORT: "3007"
      API_URL: "http://localhost:3000"

volumes:
  pgdata:
  natsdata:
  mediadata:
  searchdata:

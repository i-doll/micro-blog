apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: blog
spec:
  replicas: 0
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
      annotations:
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
    spec:
      serviceAccountName: gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: blog/gateway:dev
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: JWKS_URL
              value: "http://auth-service:3009/auth/.well-known/jwks.json"
            - name: CAPTCHA_SECRET
              valueFrom:
                secretKeyRef:
                  name: blog-shared-secrets
                  key: CAPTCHA_SECRET
          envFrom:
            - configMapRef:
                name: blog-config
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: blog
spec:
  selector:
    app: gateway
  ports:
    - port: 3000
      targetPort: 3000

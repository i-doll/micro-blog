# Default deny all traffic in the blog namespace
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: deny-all
  namespace: blog
spec: {}
---
# Allow Istio ingress gateway to reach frontend
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-frontend
  namespace: blog
spec:
  selector:
    matchLabels:
      app: frontend
  action: ALLOW
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
      to:
        - operation:
            ports: ["3007"]
---
# Auth service: public routes + JWT-protected routes
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-auth
  namespace: blog
spec:
  selector:
    matchLabels:
      app: auth-service
  action: ALLOW
  rules:
    # Allow istiod (no sidecar, no mTLS identity) to fetch JWKS for JWT validation
    - from:
        - source:
            notPrincipals: ["*"]
      to:
        - operation:
            ports: ["3009"]
            paths: ["/auth/.well-known/*"]
            methods: ["GET"]
    # Public endpoints (no JWT required)
    - from:
        - source:
            principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
      to:
        - operation:
            ports: ["3009"]
            paths: ["/auth/register", "/auth/login", "/auth/refresh", "/auth/.well-known/*", "/auth/system-status"]
    # Protected endpoints (JWT required via RequestAuthentication)
    - from:
        - source:
            principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
            requestPrincipals: ["*"]
      to:
        - operation:
            ports: ["3009"]
            paths: ["/auth/password"]
            methods: ["PUT"]
---
# Captcha service: fully public
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-captcha
  namespace: blog
spec:
  selector:
    matchLabels:
      app: captcha-service
  action: ALLOW
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
      to:
        - operation:
            ports: ["3008"]
---
# Search service: fully public
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-search
  namespace: blog
spec:
  selector:
    matchLabels:
      app: search-query
  action: ALLOW
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
      to:
        - operation:
            ports: ["3005"]
---
# Post service: public reads, JWT-protected writes
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-post
  namespace: blog
spec:
  selector:
    matchLabels:
      app: post-service
  action: ALLOW
  rules:
    # Public read access
    - from:
        - source:
            principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
      to:
        - operation:
            ports: ["3002"]
            methods: ["GET", "HEAD", "OPTIONS"]
    # JWT-protected writes
    - from:
        - source:
            principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
            requestPrincipals: ["*"]
      to:
        - operation:
            ports: ["3002"]
            methods: ["POST", "PUT", "DELETE", "PATCH"]
---
# Comment service: public reads, JWT-protected writes
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-comment
  namespace: blog
spec:
  selector:
    matchLabels:
      app: comment-service
  action: ALLOW
  rules:
    # Public read access
    - from:
        - source:
            principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
      to:
        - operation:
            ports: ["3003"]
            methods: ["GET", "HEAD", "OPTIONS"]
    # JWT-protected writes
    - from:
        - source:
            principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
            requestPrincipals: ["*"]
      to:
        - operation:
            ports: ["3003"]
            methods: ["POST", "PUT", "DELETE"]
---
# Media service: public reads, JWT-protected writes
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-media
  namespace: blog
spec:
  selector:
    matchLabels:
      app: media-service
  action: ALLOW
  rules:
    # Public read access
    - from:
        - source:
            principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
      to:
        - operation:
            ports: ["3006"]
            methods: ["GET", "HEAD", "OPTIONS"]
    # JWT-protected writes
    - from:
        - source:
            principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
            requestPrincipals: ["*"]
      to:
        - operation:
            ports: ["3006"]
            methods: ["POST", "PUT", "DELETE", "PATCH"]
---
# User service: all routes require JWT
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-user
  namespace: blog
spec:
  selector:
    matchLabels:
      app: user-service
  action: ALLOW
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
            requestPrincipals: ["*"]
      to:
        - operation:
            ports: ["3001"]
---
# Notification service: all routes require JWT
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-notification
  namespace: blog
spec:
  selector:
    matchLabels:
      app: notification-service
  action: ALLOW
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
            requestPrincipals: ["*"]
      to:
        - operation:
            ports: ["3004"]
---
# Allow all blog services to reach NATS
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-to-nats
  namespace: blog
spec:
  selector:
    matchLabels:
      app: nats
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/blog/sa/auth-service"
              - "cluster.local/ns/blog/sa/user-service"
              - "cluster.local/ns/blog/sa/post-service"
              - "cluster.local/ns/blog/sa/comment-service"
              - "cluster.local/ns/blog/sa/notification-service"
              - "cluster.local/ns/blog/sa/search-indexer"
              - "cluster.local/ns/blog/sa/search-query"
              - "cluster.local/ns/blog/sa/media-service"
      to:
        - operation:
            ports: ["4222", "8222"]
---
# Allow DB-connected services to reach PostgreSQL
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-to-postgres
  namespace: blog
spec:
  selector:
    matchLabels:
      app: postgres
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/blog/sa/auth-service"
              - "cluster.local/ns/blog/sa/user-service"
              - "cluster.local/ns/blog/sa/post-service"
              - "cluster.local/ns/blog/sa/comment-service"
              - "cluster.local/ns/blog/sa/notification-service"
              - "cluster.local/ns/blog/sa/media-service"
      to:
        - operation:
            ports: ["5432"]
---
# Allow auth-service to reach all services for system status health checks
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-auth-health-checks
  namespace: blog
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/blog/sa/auth-service"]
      to:
        - operation:
            methods: ["GET"]
            paths: ["/health"]
---
# Allow kubelet health probes (no source principal)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-health-probes
  namespace: blog
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            notPrincipals: ["*"]
      to:
        - operation:
            methods: ["GET"]
            paths: ["/health", "/healthz"]

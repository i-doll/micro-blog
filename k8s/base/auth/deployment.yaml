apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
      annotations:
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
        traffic.sidecar.istio.io/excludeOutboundPorts: "5432,4222,8222"
    spec:
      serviceAccountName: auth-service
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done']
        - name: wait-nats
          image: busybox:1.36
          command: ['sh', '-c', 'until wget -q --spider http://nats:8222/healthz; do echo waiting for nats; sleep 2; done']
      containers:
        - name: auth-service
          image: blog/auth:dev
          ports:
            - containerPort: 3009
          env:
            - name: PORT
              value: "3009"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: auth-service-db-creds
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: blog-shared-secrets
                  key: JWT_SECRET
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: blog-config
                  key: NATS_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: blog-config
                  key: LOG_LEVEL
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: blog-admin-secrets
                  key: ADMIN_EMAIL
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: blog-admin-secrets
                  key: ADMIN_PASSWORD
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: blog-admin-secrets
                  key: ADMIN_USERNAME
            - name: NATS_NKEY_SEED
              valueFrom:
                secretKeyRef:
                  name: auth-service-nats-creds
                  key: NATS_NKEY_SEED
          readinessProbe:
            httpGet:
              path: /health
              port: 3009
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: blog
spec:
  selector:
    app: auth-service
  ports:
    - port: 3009
      targetPort: 3009

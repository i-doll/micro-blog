apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: blog
data:
  nats.conf: |
    port: 4222
    http_port: 8222

    jetstream {
      store_dir: /data
    }

    authorization {
      users: [
        {
          # auth-service
          nkey: "UAS42KRT2OJKG2HS74GEZJKCDYFZECNBKTHQT43V3DERXY36EJOUKJSG"
          permissions: {
            publish: {
              allow: ["blog.user.created", "$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.user.updated", "blog.user.deleted", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
        {
          # user-service
          nkey: "UANDQQJZH7FR4MVPD2MJAPHQ62MYJ2WSMCNOJGRMRD2CE432Y76MBVKZ"
          permissions: {
            publish: {
              allow: ["blog.user.>", "$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.user.created", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
        {
          # post-service
          nkey: "UCMD7ET6X5IK3JX35CODOMYT7Z7HRAVBRDMPIK46DOH2DXSFFLMMRRTU"
          permissions: {
            publish: {
              allow: ["blog.post.>", "$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.user.deleted", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
        {
          # comment-service
          nkey: "UBILCTM752P4GCNR5WWFL7RCO2WUTAAZDTO5IM6TBSTGVSKBPVTAGCXC"
          permissions: {
            publish: {
              allow: ["blog.comment.>", "$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.post.deleted", "blog.user.deleted", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
        {
          # notification-service
          nkey: "UA6MS4UQ4OZ5XGVATFNUHGKLC3C5VK6IRDDOLZY7XDWS5JQ6V6UVHAZG"
          permissions: {
            publish: {
              allow: ["$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.comment.created", "blog.post.published", "blog.user.deleted", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
        {
          # search-indexer
          nkey: "UDI5DR72B2ETC2JNW7FIG2BFMJXVP4HPPVE7DLCRS2MV2DJNB4ESWBEW"
          permissions: {
            publish: {
              allow: ["$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.post.>", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
        {
          # media-service
          nkey: "UA7BQOJRFF5FUO73LXWKP3VYFE7RYKAMRPG2JMF5GNPCHAVHCJOQSL4D"
          permissions: {
            publish: {
              allow: ["blog.media.>", "$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.user.deleted", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
      annotations:
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
        traffic.sidecar.istio.io/excludeInboundPorts: "4222,8222"
    spec:
      serviceAccountName: nats
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["-c", "/etc/nats/nats.conf"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitoring
          volumeMounts:
            - name: natsdata
              mountPath: /data
            - name: nats-config
              mountPath: /etc/nats
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: natsdata
          emptyDir: {}
        - name: nats-config
          configMap:
            name: nats-config
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: blog
spec:
  selector:
    app: nats
  ports:
    - port: 4222
      targetPort: 4222
      name: client
    - port: 8222
      targetPort: 8222
      name: monitoring

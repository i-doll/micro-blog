apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: blog
data:
  nats.conf: |
    port: 4222
    http_port: 8222

    jetstream {
      store_dir: /data
    }

    authorization {
      users: [
        {
          # auth-service
          nkey: "UCKCAFXLX5CA67QYQNJ7H46H5WWWTTEIIPE7PQD7BWVUMTEKZWIJ7OVC"
          permissions: {
            publish: {
              allow: ["blog.user.created", "$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.user.updated", "blog.user.deleted", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
        {
          # user-service
          nkey: "UCBBYZ4WUPUDWQQ2QNDCILHZQQGE3R5GZABPM5ECAFA5SLDYN2WD5HZ5"
          permissions: {
            publish: {
              allow: ["blog.user.>", "$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.user.created", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
        {
          # post-service
          nkey: "UBEPMVYVNHA4KFFQCZTYXTW64ZXXRC5Q3S6SDMT7IOKBVVLMDHC6HEGE"
          permissions: {
            publish: {
              allow: ["blog.post.>", "$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.user.deleted", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
        {
          # comment-service
          nkey: "UDE3DJZAGWGV7M7LEPZYT4QH7IE3EDQBTY54YSCQVQXYWCDDCRZGX4F3"
          permissions: {
            publish: {
              allow: ["blog.comment.>", "$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.post.deleted", "blog.user.deleted", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
        {
          # notification-service
          nkey: "UD3SOHRJIJD5AV4XHZ5YZPW7DGW4CUS7GTQTESO2BQID4IZ4G6AEMJS5"
          permissions: {
            publish: {
              allow: ["$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.comment.created", "blog.post.published", "blog.user.deleted", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
        {
          # search-indexer
          nkey: "UA45R4REVP7Q5ZVBO3DDOOZ7VOOSVAGZ6V223X7PX7IALVFOHFD5J4H7"
          permissions: {
            publish: {
              allow: ["$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.post.>", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
        {
          # media-service
          nkey: "UAW2NSPKSHZZEMHZM2LLNA6CSG32V2GS47PDADUJNGZJN7KYA6FB2Z35"
          permissions: {
            publish: {
              allow: ["blog.media.>", "$JS.API.>", "_INBOX.>"]
            }
            subscribe: {
              allow: ["blog.user.deleted", "$JS.API.>", "$JS.ACK.>", "_INBOX.>"]
            }
          }
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
      annotations:
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
        traffic.sidecar.istio.io/excludeInboundPorts: "4222,8222"
    spec:
      serviceAccountName: nats
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["-c", "/etc/nats/nats.conf"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitoring
          volumeMounts:
            - name: natsdata
              mountPath: /data
            - name: nats-config
              mountPath: /etc/nats
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: natsdata
          emptyDir: {}
        - name: nats-config
          configMap:
            name: nats-config
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: blog
spec:
  selector:
    app: nats
  ports:
    - port: 4222
      targetPort: 4222
      name: client
    - port: 8222
      targetPort: 8222
      name: monitoring
